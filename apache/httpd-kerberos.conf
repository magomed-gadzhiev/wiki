# Конфигурация Apache для Kerberos SSO аутентификации

# Настройки Kerberos (mod_auth_gssapi)
LoadModule auth_gssapi_module modules/mod_auth_gssapi.so

# Proxy для Django backend
ProxyPreserveHost On
ProxyPass /api http://backend:8000/api
ProxyPassReverse /api http://backend:8000/api

# Настройка CORS заголовков для работы с frontend
Header always set Access-Control-Allow-Origin "*"
Header always set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH"
Header always set Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With"
Header always set Access-Control-Allow-Credentials "true"

# Обработка preflight запросов
<IfModule mod_rewrite.c>
    RewriteEngine On
    RewriteCond %{REQUEST_METHOD} OPTIONS
    RewriteRule ^(.*)$ $1 [R=200,L]
</IfModule>

# Настройка Kerberos аутентификации для API
<Location /api>
    # Включаем GSSAPI (Kerberos) аутентификацию
    AuthType GSSAPI
    AuthName "Kerberos Login"
    
    # Настройки GSSAPI/Kerberos
    GssapiCredStore keytab:/etc/krb5/http.keytab
    GssapiLocalName On
    
    # Требуем аутентификацию
    Require valid-user
    
    # Передаем имя пользователя в backend через заголовок REMOTE_USER
    RequestHeader set REMOTE_USER %{REMOTE_USER}s env=REMOTE_USER
</Location>

# Логирование для отладки
LogLevel gssapi:debug

